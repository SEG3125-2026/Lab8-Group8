<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment - Rideau Phone Repairs</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <div class="logo">Rideau Phone Repairs</div>
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="technicians.html">Technicians</a>
      <a href="bookrepair.html">Book Repair</a>
      <a href="payment.html" class="active">Payment</a>
    </nav>
  </header>

  <main class="page">
    <div class="payment-layout">
      <section class="payment-summary" id="paymentSummary"></section>

      <section class="payment-method">
        <h2>Payment Method:</h2>

        <form id="paymentForm">
          <div class="form-row">
            <label for="cardNumber">Card Number:</label>
            <input type="text" id="cardNumber" required>
          </div>

          <div class="form-row">
            <label for="expiryDate">Expiry Date:</label>
            <input type="text" id="expiryDate" required>
          </div>

          <div class="form-row">
            <label for="cvv">CVV:</label>
            <input type="text" id="cvv" required>
          </div>

          <div class="payment-actions">
            <button type="submit" class="primary-green">Confirm</button>
            <button type="button" class="primary-red" onclick="window.location.href='index.html'">Cancel</button>
          </div>
        </form>
      </section>
    </div>
  </main>

  <script src="services.js"></script>
  <script src="main.js"></script>
</body>
</html>
